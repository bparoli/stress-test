apiVersion: apps/v1
kind: Deployment
metadata:
  name: math-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: math-api
  template:
    metadata:
      labels:
        app: math-api
    spec:
      containers:
        - name: math-api
          image: math-api:latest
          imagePullPolicy: Never   # usar imagen local (minikube/kind)
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: math-api
spec:
  selector:
    app: math-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
