apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: math-api:latest
          imagePullPolicy: Never
          command: ["python", "worker.py"]
          env:
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq/
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
